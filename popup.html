<!DOCTYPE html>\n<html>\n<head>\n  <meta charset="UTF-8">\n  <style>\n    body {\n      width: 400px;\n      padding: 16px;\n      font-family: Arial, sans-serif;\n      background-color: #f5f5f5;\n    }\n    h2 {\n      color: #1f2937;\n      margin-top: 0;\n    }\n    .form-group {\n      margin-bottom: 12px;\n    }\n    label {\n      display: block;\n      margin-bottom: 6px;\n      color: #374151;\n      font-weight: 500;\n      font-size: 14px;\n    }\n    textarea {\n      width: 100%;\n      padding: 10px;\n      border: 1px solid #d1d5db;\n      border-radius: 6px;\n      font-family: Arial, sans-serif;\n      font-size: 14px;\n      resize: vertical;\n      min-height: 100px;\n      box-sizing: border-box;\n    }\n    textarea:focus {\n      outline: none;\n      border-color: #3b82f6;\n      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);\n    }\n    button {\n      background-color: #3b82f6;\n      color: white;\n      border: none;\n      padding: 10px 16px;\n      border-radius: 6px;\n      font-size: 14px;\n      font-weight: 600;\n      cursor: pointer;\n      width: 100%;\n      transition: background-color 0.2s;\n    }\n    button:hover {\n      background-color: #2563eb;\n    }\n    button:active {\n      background-color: #1d4ed8;\n    }\n    .status {\n      margin-top: 12px;\n      padding: 10px;\n      border-radius: 6px;\n      text-align: center;\n      font-size: 14px;\n      display: none;\n    }\n    .status.success {\n      background-color: #d1fae5;\n      color: #065f46;\n      display: block;\n    }\n    .status.error {\n      background-color: #fee2e2;\n      color: #991b1b;\n      display: block;\n    }\n  </style>\n</head>\n<body>\n  <h2>Google FX Auto Fill</h2>\n  \n  <div class="form-group">\n    <label for="textInput">Nhập text cần điền:</label>\n    <textarea id="textInput" placeholder="Nhập nội dung tại đây..."></textarea>\n  </div>\n  \n  <button id="fillButton">Điền vào trang</button>\n  \n  <div id="status" class="status"></div>\n\n  <script src="popup.js"></script>\n</body>\n</html>
